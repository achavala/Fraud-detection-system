apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: fraud-detection
  labels:
    app: celery-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      serviceAccountName: fraud-worker-sa
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: celery-worker
      containers:
        - name: worker
          image: "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - src.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - features,labels,governance,experiments,celery
          envFrom:
            - configMapRef:
                name: fraud-platform-config
            - secretRef:
                name: fraud-platform-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: "fraud-detection-worker"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: fraud-detection
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: celery-worker-pdb
  namespace: fraud-detection
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: celery-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: fraud-detection
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      serviceAccountName: fraud-worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: beat
          image: "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - src.workers.celery_app
            - beat
            - --loglevel=info
            - --schedule=/tmp/celerybeat-schedule
          envFrom:
            - configMapRef:
                name: fraud-platform-config
            - secretRef:
                name: fraud-platform-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: "fraud-detection-beat"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
