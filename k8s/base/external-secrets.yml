# ExternalSecrets Operator — syncs AWS Secrets Manager → K8s Secrets
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: fraud-detection
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fraud-platform-secrets
  namespace: fraud-detection
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: fraud-platform-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: fraud-detection-production/platform-secrets
