# Service accounts with IRSA annotations for pod-level AWS access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-api-sa
  namespace: fraud-detection
  annotations:
    eks.amazonaws.com/role-arn: "${API_POD_ROLE_ARN}"
  labels:
    app: fraud-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-worker-sa
  namespace: fraud-detection
  annotations:
    eks.amazonaws.com/role-arn: "${WORKER_POD_ROLE_ARN}"
  labels:
    app: celery-worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: fraud-detection
  annotations:
    eks.amazonaws.com/role-arn: "${EXTERNAL_SECRETS_ROLE_ARN}"
