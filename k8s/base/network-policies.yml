# Network Policies — zero-trust pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: fraud-detection
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fraud-api
  namespace: fraud-detection
spec:
  podSelector:
    matchLabels:
      app: fraud-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: 8000
          protocol: TCP
        - port: 9464
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 6333
          protocol: TCP
        - port: 6334
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-celery-worker
  namespace: fraud-detection
spec:
  podSelector:
    matchLabels:
      app: celery-worker
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 6333
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-qdrant
  namespace: fraud-detection
spec:
  podSelector:
    matchLabels:
      app: qdrant
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fraud-api
        - podSelector:
            matchLabels:
              app: celery-worker
      ports:
        - port: 6333
          protocol: TCP
        - port: 6334
          protocol: TCP
