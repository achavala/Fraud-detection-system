apiVersion: v1
kind: Secret
metadata:
  name: fraud-platform-secrets
  namespace: fraud-detection
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_PRODUCTION_SECRET"
  DATABASE_URL: "postgresql+asyncpg://fraud_user:REPLACE@postgres:5432/fraud_db"
  DATABASE_URL_SYNC: "postgresql://fraud_user:REPLACE@postgres:5432/fraud_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  # Optional — leave empty to disable
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  SLACK_BOT_TOKEN: ""
  GITHUB_TOKEN: ""
