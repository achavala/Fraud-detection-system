name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check src/ tests/ scripts/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: fraud_pass
          POSTGRES_DB: fraud_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fraud_user -d fraud_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fraud_user:fraud_pass@localhost:5432/fraud_db
      DATABASE_URL_SYNC: postgresql://fraud_user:fraud_pass@localhost:5432/fraud_db
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=reports/junit-unit.xml

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --junitxml=reports/junit-integration.xml

      - name: Run resilience tests
        run: pytest tests/resilience/ -v --tb=short --junitxml=reports/junit-resilience.xml

      - name: Run evaluation tests (skip slow)
        run: pytest tests/evaluation/ -v --tb=short -m "not slow" --junitxml=reports/junit-eval.xml

      - name: Full coverage report
        run: pytest tests/ -v --cov=src --cov-report=xml:reports/coverage.xml --cov-report=term-missing -m "not slow"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: fraud-detection-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image starts
        run: |
          docker run -d --name smoke-test \
            -e DATABASE_URL=sqlite+aiosqlite:///test.db \
            -e APP_ENV=test \
            -p 8000:8000 \
            fraud-detection-platform:${{ github.sha }} || true
          sleep 5
          docker logs smoke-test || true
          docker rm -f smoke-test || true
